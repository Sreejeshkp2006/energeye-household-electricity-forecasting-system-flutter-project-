name: miniproject
description: Energy consumption tracking and prediction app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.0

  # Charts
  fl_chart: ^0.66.0

  # HTTP for ML API
  http: ^1.2.0

  # Image Picking & OCR
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.11.0
  path_provider: ^2.1.2

  # Optional (number formatting)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
